name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  # Run JS-based actions on Node 24 (the GitHub default from 2026-06-16).
  # Opting in early silences the Node 20 action-runtime deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip when the commit was already produced by the release bot itself.
    if: github.repository == 'Anuj7411/answerfox'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so changesets can compare against previous releases.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >= 11.5.1, which is required for
          # Trusted Publishing's OIDC token exchange. Node 20 ships
          # with npm 10.x and fails the auth handshake silently.
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        # Belt-and-braces: even with Node 24, pin npm to the latest
        # release so future-dated runs don't regress if Node's bundled
        # version drifts. Trusted Publishing requires >= 11.5.1.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # No explicit build step — the publish action below invokes
      # `pnpm release`, which runs `turbo run build --filter='./packages/*'`
      # under the hood. Docs (`apps/docs`) and examples are excluded
      # because they aren't published to npm and have heavier build
      # toolchains (Next.js, Nextra) that block releases unnecessarily.

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          # When changesets exist on main, open a "Version Packages" PR.
          # When that PR is merged (changesets consumed), publish to npm.
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — authentication uses Trusted Publishing
          # (OIDC) via the `id-token: write` permission above. Each
          # @answerfox/* package is configured on npm to trust
          # GitHub Actions for this repo's release.yml workflow.
          # See: https://docs.npmjs.com/trusted-publishers
          #
          # Provenance attestations are emitted automatically under
          # the Trusted Publishing flow — no NPM_CONFIG_PROVENANCE
          # flag needed.
