name: Feature request
description: Suggest a new feature, audit check, or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Start with the user pain — features without a problem statement get deprioritized.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Answerfox do? Be as concrete as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they're worse.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, prior art, SEO standards references.
